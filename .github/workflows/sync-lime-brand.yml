name: Sync LIME Brand Traffic

on:
  schedule:
    - cron: "0 6 * * 1"   # понедельник 09:00 MSK — закрытая прошлая неделя
  workflow_dispatch:
    inputs:
      wordstat_from:
        description: "Бэкфилл спроса Wordstat с даты (YYYY-MM-DD), напр. 2023-01-02. Пусто = инкремент."
        required: false
        default: ""
      gsc_from:
        description: "Бэкфилл GSC/Google-спроса с даты (YYYY-MM-DD), напр. 2025-04-01 (GSC ~16 мес истории). Пусто = инкремент."
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Apply lime migrations
        run: python scripts/apply_lime_migrations.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Write Google service-account key
        env:
          GSC_SA_KEY: ${{ secrets.GSC_SA_KEY }}   # lime-reports SA (Search Console API включён; ≠ GCP_SA_KEY проекта Sheets)
        run: |
          if [ -n "$GSC_SA_KEY" ]; then printf '%s' "$GSC_SA_KEY" > sa.json; fi
      - name: Sync brand traffic
        run: python sync_brand.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WORDSTAT_WEBMASTER_TOKEN: ${{ secrets.WORDSTAT_WEBMASTER_TOKEN }}
          YANDEX_SEARCHAPI_KEY: ${{ secrets.YANDEX_SEARCHAPI_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: sa.json
          WORDSTAT_FROM: ${{ github.event.inputs.wordstat_from }}
          GSC_FROM: ${{ github.event.inputs.gsc_from }}
