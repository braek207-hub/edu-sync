name: Sync BJORN Market Demand

on:
  schedule:
    - cron: "0 5 * * *"   # ежедневно 08:00 MSK; гард в синке пропускает, если прошлая неделя уже залита
  workflow_dispatch:
    inputs:
      wordstat_from:
        description: "Бэкфилл спроса с даты (YYYY-MM-DD), напр. 2024-06-01. Пусто = инкремент."
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Sync BJORN market demand
        run: python sync_bjorn_demand.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          YANDEX_SEARCHAPI_KEY: ${{ secrets.YANDEX_SEARCHAPI_KEY }}
          WORDSTAT_FROM: ${{ github.event.inputs.wordstat_from }}
