name: Probe GCC GSC

# Разовый зонд (no-guessing): есть ли брендовый спрос/SEO Google по странам Залива
# и какие ресурсы GSC доступны сервис-аккаунту. В БД не пишет. Удалить после фазы 0.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Write Google service-account key
        env:
          GSC_SA_KEY: ${{ secrets.GSC_SA_KEY }}
        run: printf '%s' "$GSC_SA_KEY" > sa.json
      - name: Probe
        run: python scripts/probe_gcc_gsc.py
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa.json
