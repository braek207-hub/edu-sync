name: build-edu-features
on:
  schedule:
    - cron: "0 2 * * 1"   # понедельник 02:00 UTC (после ночных синков)
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Build feature store (vuz)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_POOLER_URL: ${{ secrets.DATABASE_POOLER_URL }}
        run: python -m sync.ml_features_build
