name: Sync LIME GCC → Supabase

on:
  schedule:
    # 05:30 UTC = 08:30 Moscow (после дневного sync-lime)
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      sync_days:
        description: "Days back to sync (default 7). Игнорируется, если заданы sync_from И sync_to"
        required: false
        default: "7"
      sync_from:
        description: "Бэкфилл: дата начала YYYY-MM-DD (только вместе с sync_to)"
        required: false
      sync_to:
        description: "Бэкфилл: дата конца YYYY-MM-DD"
        required: false

concurrency:
  group: lime-gcc-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # 180 мин — под бэкфилл (дневной прогон занимает ~1 мин и выходит сразу)
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GCC sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GCC_METRICA_TOKEN: ${{ secrets.GCC_METRICA_TOKEN }}
          GCC_TRIPLEWHALE_API_KEY: ${{ secrets.GCC_TRIPLEWHALE_API_KEY }}
          GCC_TW_SHOP_DOMAIN: ${{ secrets.GCC_TW_SHOP_DOMAIN }}
          LIME_GCC_SYNC_DAYS: ${{ github.event.inputs.sync_days || '7' }}
          # Пусто на кроне → синк уходит в режим SYNC_DAYS (в коде `if frm and to`)
          LIME_GCC_SYNC_FROM: ${{ github.event.inputs.sync_from }}
          LIME_GCC_SYNC_TO: ${{ github.event.inputs.sync_to }}
          PYTHONIOENCODING: "utf-8"
        run: python -m sync.lime_gcc
