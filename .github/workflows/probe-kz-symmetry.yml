name: Probe GSC history depth

# Разовый зонд: занижен ли казахстанский спрос из-за того, что KZ считается только
# по корневому домену. В БД не пишет. Удалить после проверки.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Write Google service-account key
        env:
          GSC_SA_KEY: ${{ secrets.GSC_SA_KEY }}
        run: printf '%s' "$GSC_SA_KEY" > sa.json
      - name: Probe
        run: python scripts/probe_gsc_history_depth.py
        env:
          GOOGLE_APPLICATION_CREDENTIALS: sa.json
