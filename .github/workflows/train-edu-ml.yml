name: train-edu-ml
on:
  schedule:
    - cron: "0 3 * * 1"   # понедельник 03:00 UTC (после build-edu-features 02:00)
  workflow_dispatch:
jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Train cascade (vuz)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m sync.ml_train
