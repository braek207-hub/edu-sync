name: score-edu-ml
on:
  schedule:
    - cron: "0 4 * * *"   # ежедневно 04:00 UTC (после обучения по понедельникам)
  workflow_dispatch:
jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Score leads + forecast (vuz)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m sync.ml_score
