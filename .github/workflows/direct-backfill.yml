# Backfill Direct через API (full replace или monthly upsert).
name: Direct Backfill (API)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "full_replace — delete+reload с даты; monthly_upsert — по месяцам без delete"
        required: false
        default: "monthly_upsert"
        type: choice
        options:
          - monthly_upsert
          - full_replace
      direct_date_from:
        description: "С даты (YYYY-MM-DD)"
        required: false
        default: "2025-01-01"
        type: string
      direct_date_to:
        description: "По дату (YYYY-MM-DD), только для monthly_upsert"
        required: false
        default: "2025-12-31"
        type: string

jobs:
  direct:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Direct API backfill
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_TOKEN: ${{ secrets.DIRECT_TOKEN }}
          DIRECT_TOKEN_EDU: ${{ secrets.DIRECT_TOKEN_EDU }}
          DIRECT_CLIENTS_JSON: ${{ secrets.DIRECT_CLIENTS_JSON }}
          DIRECT_CLIENTS_JSON_EDU: ${{ secrets.DIRECT_CLIENTS_JSON_EDU }}
          DIRECT_CLIENT_LOGIN: ${{ secrets.DIRECT_CLIENT_LOGIN }}
          DIRECT_SOURCE: api
          DIRECT_SYNC_MODE: ${{ github.event.inputs.mode || 'monthly_upsert' }}
          DIRECT_DATE_FROM: ${{ github.event.inputs.direct_date_from || '2025-01-01' }}
          DIRECT_DATE_TO: ${{ github.event.inputs.direct_date_to || '2025-12-31' }}
        run: |
          python -c "
          from main import _resolve_env
          _resolve_env()
          from sync.db import ensure_schema
          from sync.direct import sync_direct_all
          ensure_schema()
          n = sync_direct_all()
          print('direct_stats rows upserted:', n)
          if n <= 0:
              raise SystemExit('Direct sync returned 0 rows')
          "
