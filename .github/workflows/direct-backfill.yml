# Полная загрузка Direct через API (без листов).
name: Direct Full Sync (API)

on:
  workflow_dispatch:
    inputs:
      direct_date_from:
        description: "С даты (YYYY-MM-DD)"
        required: false
        default: "2026-01-01"
        type: string

jobs:
  direct:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Direct API full period
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_TOKEN: ${{ secrets.DIRECT_TOKEN }}
          DIRECT_TOKEN_EDU: ${{ secrets.DIRECT_TOKEN_EDU }}
          DIRECT_CLIENTS_JSON: ${{ secrets.DIRECT_CLIENTS_JSON }}
          DIRECT_CLIENTS_JSON_EDU: ${{ secrets.DIRECT_CLIENTS_JSON_EDU }}
          DIRECT_CLIENT_LOGIN: ${{ secrets.DIRECT_CLIENT_LOGIN }}
          DIRECT_SOURCE: api
          DIRECT_SYNC_MODE: full
          DIRECT_DATE_FROM: ${{ github.event.inputs.direct_date_from || '2026-01-01' }}
        run: |
          python -c "
          from main import _resolve_env
          _resolve_env()
          from sync.db import ensure_schema
          from sync.direct import sync_direct_all
          ensure_schema()
          n = sync_direct_all()
          print('direct_stats rows:', n)
          if n <= 0:
              raise SystemExit('Direct sync returned 0 rows')
          "
