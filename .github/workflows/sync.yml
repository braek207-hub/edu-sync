name: EDU Daily Sync

on:
  schedule:
    # 04:00 UTC = 07:00 Moscow
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      direct_sync_mode:
        description: "Direct — incremental (7 дн.) или full (весь период с даты)"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
      direct_date_from:
        description: "Direct full: с даты (YYYY-MM-DD)"
        required: false
        default: "2026-01-01"
        type: string
      metrika_dry_run:
        description: "Метрика: dry-run (только посчитать, не грузить)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Google SA key file
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            printf '%s' "$GCP_SA_KEY" > sa.json
          elif [ -n "$GOOGLE_SERVICE_ACCOUNT" ]; then
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT" > sa.json
          else
            echo "No Google credentials secret"
            exit 1
          fi

      - name: Run sync
        env:
          # Без буферизации stdout — пер-шаговый прогресс виден в логе сразу,
          # не теряется при отмене/таймауте.
          PYTHONUNBUFFERED: "1"
          GOOGLE_APPLICATION_CREDENTIALS: sa.json
          DIRECT_SOURCE: api
          DIRECT_SYNC_MODE: ${{ github.event.inputs.direct_sync_mode || 'incremental' }}
          DIRECT_DAYS_BACK: "7"
          DIRECT_DATE_FROM: ${{ github.event.inputs.direct_date_from || '2026-01-01' }}
          # Daily (incremental) — только текущий год; полный прогон (full) — оба года.
          CRM_LEADS_SHEETS: ${{ github.event.inputs.direct_sync_mode == 'full' && 'Лиды,Лиды 2025' || 'Лиды' }}
          CRM_PAYMENTS_SHEETS: ${{ github.event.inputs.direct_sync_mode == 'full' && 'Оплаты,Оплаты 2025' || 'Оплаты' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_TOKEN: ${{ secrets.DIRECT_TOKEN }}
          DIRECT_TOKEN_EDU: ${{ secrets.DIRECT_TOKEN_EDU }}
          DIRECT_CLIENTS_JSON: ${{ secrets.DIRECT_CLIENTS_JSON }}
          DIRECT_CLIENTS_JSON_EDU: ${{ secrets.DIRECT_CLIENTS_JSON_EDU }}
          DIRECT_CLIENT_LOGIN: ${{ secrets.DIRECT_CLIENT_LOGIN }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          SHEET_ID_EDU: ${{ secrets.SHEET_ID_EDU }}
          # Офлайн-конверсии в Я.Метрику. Расписание/incremental — реальная загрузка;
          # ручной запуск по умолчанию dry-run (только посчитать).
          YM_TOKEN: ${{ secrets.YM_TOKEN }}
          METRIKA_DRY_RUN: ${{ github.event.inputs.metrika_dry_run || 'false' }}
        run: python main.py

      # Сброс серверного кэша Panda-BI (unstable_cache 24ч): иначе правки плана/CRM/директа
      # в дашборде видны лишь через сутки. Как в sync-lime/decortier/edu-direct-settings.
      - name: Revalidate dashboard cache
        if: success()
        run: curl -sf -X POST https://panda-bi.vercel.app/api/revalidate
