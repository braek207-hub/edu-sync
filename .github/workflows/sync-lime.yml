name: Sync LIME → Supabase

on:
  schedule:
    - cron: "30 8 * * *"  # 11:30 Moscow (UTC+3)
  workflow_dispatch:
    inputs:
      sync_from:
        description: "Backfill range start (YYYY-MM-DD, optional — leave empty for last 7 days)"
        required: false
        default: ""
      sync_to:
        description: "Backfill range end (YYYY-MM-DD, optional — leave empty for last 7 days)"
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          LIME_DB_HOST: ${{ secrets.LIME_DB_HOST }}
          LIME_DB_PORT: ${{ secrets.LIME_DB_PORT }}
          LIME_DB_SCHEMA: ${{ secrets.LIME_DB_SCHEMA }}
          LIME_DB_USER: ${{ secrets.LIME_DB_USER }}
          LIME_DB_PASSWORD: ${{ secrets.LIME_DB_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LIME_SYNC_DAYS: "7"
          LIME_SYNC_FROM: ${{ github.event.inputs.sync_from }}
          LIME_SYNC_TO: ${{ github.event.inputs.sync_to }}
          PYTHONIOENCODING: "utf-8"
        run: python -m sync.lime
