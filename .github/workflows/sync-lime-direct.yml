name: Sync LIME Direct → Supabase

on:
  schedule:
    # 07:00 UTC = 10:00 Moscow
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      days_back:
        description: "Days back to sync (default 7)"
        required: false
        default: "7"
      fx_backfill:
        description: "1 = дозаполнить cost_rub на всей истории (строки без курса)"
        required: false
        default: "0"
      # Отдельное окно для Роистата: его история глубже, чем у остальных синков, а гнать
      # days_back=565 нельзя — Директ и Метрика пересчитывали бы полтора года впустую
      # (одна Метрика на 60 днях идёт 9 минут).
      roistat_from:
        description: "Бэкфилл Роистата: дата начала YYYY-MM-DD (нужны обе даты)"
        required: false
        default: ""
      roistat_to:
        description: "Бэкфилл Роистата: дата конца YYYY-MM-DD"
        required: false
        default: ""

concurrency:
  group: lime-direct-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply DB migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/apply_lime_migrations.py

      - name: Run LIME Direct sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LIME_DIRECT_TOKEN: ${{ secrets.LIME_DIRECT_TOKEN }}
          LIME_DIRECT_CLIENT_LOGIN: ${{ secrets.LIME_DIRECT_CLIENT_LOGIN }}
          LIME_DIRECT_DAYS_BACK: ${{ github.event.inputs.days_back || '7' }}
          PYTHONIOENCODING: "utf-8"
        run: python -m sync.lime_direct

      - name: Run LIME Direct KZ sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LIME_DIRECT_TOKEN: ${{ secrets.LIME_DIRECT_KZ_TOKEN }}
          LIME_DIRECT_CLIENT_LOGIN: ${{ secrets.LIME_DIRECT_KZ_CLIENT_LOGIN }}
          LIME_DIRECT_DAYS_BACK: ${{ github.event.inputs.days_back || '7' }}
          PYTHONIOENCODING: "utf-8"
        run: python -m sync.lime_direct

      - name: Google Ads → рубли (cost_rub по курсу ЦБ)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_ADS_FX_DAYS_BACK: "30"
          GOOGLE_ADS_FX_BACKFILL: ${{ github.event.inputs.fx_backfill || '0' }}
          PYTHONIOENCODING: "utf-8"
        run: python -m sync.google_ads_fx

      # Идёт ПОСЛЕ конвертации Google в рубли: склейка читает готовый cost_rub.
      - name: Run LIME KZ Metrika sync (region=kz_metrika)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LIME_METRIKA_TOKEN: ${{ secrets.LIME_METRIKA_TOKEN }}
          # Было захардкожено "30", из-за чего бэкфилл этого среза через UI был невозможен:
          # ручной прогон с days_back=50 всё равно пересчитывал 30 дней, и правки склейки
          # не доезжали до старых дат (2026-07-19: кампании Meta появились только с 20.06).
          LIME_KZ_METRIKA_DAYS_BACK: ${{ github.event.inputs.days_back || '30' }}
          PYTHONIOENCODING: "utf-8"
        run: python -m sync.lime_kz_metrika

      # Идёт ПОСЛЕ синка кабинета Директа: расход Директа берётся из lime_direct_stats
      # (в самом Роистате он в рублях под видом тенге), и тот должен быть свежим.
      - name: Run LIME KZ Roistat sync (region=kz_roistat)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ROISTAT_API_KEY: ${{ secrets.ROISTAT_API_KEY }}
          ROISTAT_PROJECT_ID: ${{ secrets.ROISTAT_PROJECT_ID }}
          LIME_KZ_ROISTAT_DAYS_BACK: ${{ github.event.inputs.days_back || '30' }}
          # Заданы обе даты — синк идёт по ним и игнорирует DAYS_BACK (см. sync_lime_kz_roistat).
          LIME_KZ_ROISTAT_FROM: ${{ github.event.inputs.roistat_from }}
          LIME_KZ_ROISTAT_TO: ${{ github.event.inputs.roistat_to }}
          PYTHONIOENCODING: "utf-8"
        run: python -m sync.lime_kz_roistat

      - name: Revalidate dashboard cache
        if: success()
        run: curl -sf -X POST https://panda-bi.vercel.app/api/revalidate
